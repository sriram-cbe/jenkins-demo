version: '3.8'

services:
  jenkins-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-demo-app
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/home/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - jenkins-demo-network

networks:
  jenkins-demo-network:
    driver: bridge